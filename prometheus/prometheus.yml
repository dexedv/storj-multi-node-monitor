# Prometheus configuration for Storj Multi-Node Monitor
global:
  scrape_interval: 60s
  evaluation_interval: 60s

rule_files:
  - "alert_rules.yml"
  - "recording_rules.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - localhost:9093

scrape_configs:
  - job_name: 'storj'
    scrape_interval: 60s
    static_configs:
      - targets: ['localhost:9651']

  - job_name: 'storj_price'
    scrape_interval: 5m
    static_configs:
      - targets: ['localhost:9652']

  - job_name: 'windows'
    scrape_interval: 30s
    static_configs:
      - targets: ['localhost:9182']

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
